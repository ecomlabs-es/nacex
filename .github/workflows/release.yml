name: Release

on:
  push:
    tags:
      - 'v*'
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer
          coverage: none

      - name: Install dependencies (production)
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Build module zip
        run: |
          MODULE_NAME="nacex"
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p /tmp/build/${MODULE_NAME}
          rsync -a --exclude='.git' \
                   --exclude='.github' \
                   --exclude='tests' \
                   --exclude='.php-cs-fixer.dist.php' \
                   --exclude='.phpunit.result.cache' \
                   --exclude='phpunit.xml.dist' \
                   --exclude='phpstan.neon' \
                   --exclude='log' \
                   ./ /tmp/build/${MODULE_NAME}/
          cd /tmp/build
          zip -r ${MODULE_NAME}-${TAG}.zip ${MODULE_NAME}/
          echo "ZIP_PATH=/tmp/build/${MODULE_NAME}-${TAG}.zip" >> $GITHUB_ENV
          echo "ZIP_NAME=${MODULE_NAME}-${TAG}.zip" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.ZIP_PATH }}
